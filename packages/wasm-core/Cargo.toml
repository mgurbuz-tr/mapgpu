[package]
name = "mapgpu-wasm-core"
version = "0.0.1"
edition = "2024"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
wasm-bindgen = "0.2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
earcutr = "0.4"
prost = "0.13"

[dev-dependencies]
wasm-bindgen-test = "0.3"
criterion = "0.5"

[[bench]]
name = "parse_mvt_bench"
harness = false

[profile.release]
opt-level = "s"
lto = true
