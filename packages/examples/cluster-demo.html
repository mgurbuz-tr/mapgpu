<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MapGPU — Cluster Demo</title>
  <link rel="stylesheet" href="./src/theme.css" />
  <style>
    body { display: flex; flex-direction: column; }

    /* ─── Topbar ─── */
    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 0 16px; height: 44px; flex-shrink: 0; z-index: 10;
    }
    .topbar h1 { font-size: 0.85rem; font-weight: 600; margin: 0; }
    .topbar h1 span { color: var(--accent); }
    .topbar-right { display: flex; align-items: center; gap: 10px; }
    .fps-badge { font-size: 0.7rem; padding: 2px 8px; border-radius: 4px; background: var(--surface2); border: 1px solid var(--border); color: var(--text-muted); font-variant-numeric: tabular-nums; }

    /* ─── Mode Toggle ─── */
    .mode-toggle { display: flex; gap: 2px; background: var(--surface2); border-radius: 5px; padding: 2px; }
    .mode-toggle button {
      font-size: 0.7rem; padding: 3px 10px; border: none; border-radius: 3px;
      background: transparent; color: var(--text-muted); cursor: pointer; transition: all 0.15s;
    }
    .mode-toggle button.active { background: var(--accent); color: var(--bg); font-weight: 600; }

    /* ─── Main Layout ─── */
    .main { display: flex; flex: 1; min-height: 0; }
    #map { flex: 1; }

    /* ─── Sidebar ─── */
    .sidebar {
      width: 280px; background: var(--surface); border-left: 1px solid var(--border);
      overflow-y: auto; padding: 14px 16px; flex-shrink: 0;
    }
    .panel-section { margin-bottom: 16px; }
    .panel-title {
      font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.8px;
      color: var(--text-muted); margin-bottom: 8px; padding-bottom: 4px;
      border-bottom: 1px solid var(--border);
    }
    .panel-row {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 6px; font-size: 0.78rem;
    }
    .panel-row label { color: var(--text-muted); }
    .panel-row .value { color: var(--text); font-variant-numeric: tabular-nums; }
    input[type="range"] { width: 100%; margin: 4px 0; accent-color: var(--accent); }
    .btn-primary {
      width: 100%; padding: 7px; border: 1px solid var(--border); border-radius: 5px;
      background: var(--surface2); color: var(--text); cursor: pointer;
      font-size: 0.78rem; transition: border-color 0.15s;
    }
    .btn-primary:hover { border-color: var(--accent); }

    /* ─── Stats ─── */
    .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px 12px; }
    .stat-item { font-size: 0.75rem; }
    .stat-label { color: var(--text-muted); }
    .stat-value { color: var(--text); font-weight: 600; font-variant-numeric: tabular-nums; }

    /* ─── Log ─── */
    .log-panel {
      height: 100px; background: var(--surface); border-top: 1px solid var(--border);
      overflow-y: auto; padding: 6px 12px; font-family: var(--font-mono, monospace);
      font-size: 0.7rem; color: var(--text-muted); flex-shrink: 0;
    }
    .log-panel .entry { margin-bottom: 2px; }
    .log-panel .time { color: var(--blue); }
  </style>
</head>
<body>

  <!-- Topbar -->
  <div class="topbar">
    <h1><span>MapGPU</span> Cluster Demo</h1>
    <div class="topbar-right">
      <div class="mode-toggle">
        <button id="btn2d" class="active">2D</button>
        <button id="btn3d">3D Globe</button>
      </div>
      <span class="fps-badge" id="fps">-- FPS</span>
    </div>
  </div>

  <!-- Main -->
  <div class="main">
    <div id="map"></div>

    <!-- Sidebar -->
    <div class="sidebar">

      <div class="panel-section">
        <div class="panel-title">Data Source</div>
        <div class="panel-row">
          <label>Points</label>
          <span class="value" id="pointCountLabel">5000</span>
        </div>
        <input type="range" id="pointCount" min="100" max="50000" step="100" value="5000" />
        <button class="btn-primary" id="regenerate">Regenerate Points</button>
      </div>

      <div class="panel-section">
        <div class="panel-title">Cluster Config</div>
        <div class="panel-row">
          <label>Radius</label>
          <span class="value"><span id="radiusLabel">60</span>px</span>
        </div>
        <input type="range" id="radius" min="20" max="200" step="5" value="60" />
        <div class="panel-row">
          <label>Min Points</label>
          <span class="value" id="minPointsLabel">2</span>
        </div>
        <input type="range" id="minPoints" min="2" max="20" step="1" value="2" />
        <div class="panel-row" style="margin-top: 10px;">
          <label for="themePreset">Theme</label>
          <select id="themePreset" class="value" style="min-width: 130px; background: var(--surface2); color: var(--text); border: 1px solid var(--border); border-radius: 4px; padding: 4px 6px; font-size: 0.75rem;">
            <option value="ref-dark-cyan" selected>ref-dark-cyan</option>
            <option value="legacy-orange">legacy-orange</option>
          </select>
        </div>
      </div>

      <div class="panel-section">
        <div class="panel-title">Stats</div>
        <div class="stat-grid">
          <div class="stat-item">
            <div class="stat-label">Points</div>
            <div class="stat-value" id="statPoints">0</div>
          </div>
          <div class="stat-item">
            <div class="stat-label">Clusters</div>
            <div class="stat-value" id="statClusters">--</div>
          </div>
          <div class="stat-item">
            <div class="stat-label">Zoom</div>
            <div class="stat-value" id="statZoom">--</div>
          </div>
          <div class="stat-item">
            <div class="stat-label">Mode</div>
            <div class="stat-value" id="statMode">2D</div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- Log Panel -->
  <div class="log-panel" id="logPanel"></div>

  <script type="module" src="./src/cluster-demo.ts"></script>
</body>
</html>
