<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Renderers — MapGPU</title>
  <link rel="stylesheet" href="./src/theme.css" />
  <style>
    .main { display: flex; height: calc(100vh - 48px); }
    #map { flex: 1; position: relative; }
    .sidebar { width: 260px; padding: 16px; border-left: 1px solid var(--border); overflow-y: auto; background: var(--surface); }
    .sidebar h3 { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); margin-bottom: 12px; }
    .renderer-btn { display: block; width: 100%; padding: 10px 14px; margin-bottom: 8px; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; color: var(--text); cursor: pointer; font-size: 0.85rem; text-align: left; transition: border-color 0.2s; }
    .renderer-btn:hover { border-color: var(--accent); }
    .renderer-btn b { display: block; margin-bottom: 2px; }
    .renderer-btn span { font-size: 0.75rem; color: var(--text-muted); }
  </style>
  <script type="module" src="./src/embed.ts"></script>
</head>
<body>
  <div class="topbar">
    <a href="/examples/" class="back">&larr; Examples</a>
    <span class="title">Renderers</span>
    <div class="spacer"></div>
    <button id="btn-mode" class="btn">Switch to 3D</button>
  </div>
  <div class="main">
    <div id="map"></div>
    <div class="sidebar">
      <h3>Renderer Type</h3>
      <button id="btn-simple" class="renderer-btn"><b>SimpleRenderer</b><span>Same symbol for all features</span></button>
      <button id="btn-unique" class="renderer-btn"><b>UniqueValueRenderer</b><span>Symbol by region attribute</span></button>
      <button id="btn-classbreaks" class="renderer-btn"><b>ClassBreaksRenderer</b><span>Symbol by population range</span></button>
      <button id="btn-callback" class="renderer-btn"><b>CallbackRenderer</b><span>Dynamic size from population</span></button>
    </div>
  </div>
  <script type="module" src="./src/renderers.ts"></script>
</body>
</html>
