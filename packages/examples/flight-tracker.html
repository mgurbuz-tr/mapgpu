<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MapGPU — Flight Tracker</title>
  <link rel="stylesheet" href="./src/theme.css" />
  <style>
    /* ─── Layout ─── */
    .main { display: flex; flex: 1; overflow: hidden; }
    #map-container { flex: 1; position: relative; }

    /* ─── Loading Overlay ─── */
    .loading-overlay {
      position: absolute; inset: 0; z-index: 100;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: var(--bg); color: var(--text); gap: 16px;
    }
    .loading-overlay.hidden { display: none; }
    .loading-title { font-size: 1.2rem; font-weight: 700; color: var(--accent); }
    .loading-sub { font-size: 0.8rem; color: var(--text-muted); }
    .progress-bar { width: 300px; height: 6px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--accent); border-radius: 3px; width: 0%; transition: width 0.15s; }

    /* ─── Tooltip ─── */
    #tooltip {
      position: fixed; display: none; z-index: 200;
      background: rgba(13,17,23,0.94); border: 1px solid var(--border);
      border-radius: 6px; padding: 8px 12px; pointer-events: none;
      box-shadow: 0 4px 16px rgba(0,0,0,0.4); max-width: 220px;
    }
    .tip-callsign { font-size: 0.85rem; font-weight: 700; color: var(--accent); margin-bottom: 3px; }
    .tip-country { font-size: 0.7rem; color: var(--text-muted); margin-bottom: 4px; }
    .tip-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2px 12px; font-size: 0.7rem; }
    .tip-grid label { color: var(--text-muted); }
    .tip-grid span { color: var(--text); font-family: var(--font-mono); font-weight: 600; }

    /* ─── Sidebar ─── */
    .sidebar { width: 300px; flex-shrink: 0; display: flex; flex-direction: column; border-left: 1px solid var(--border); background: var(--surface); overflow: hidden; }
    .sidebar-scroll { flex: 1; overflow-y: auto; }

    /* ─── Flight List ─── */
    .flight-item {
      display: flex; align-items: center; gap: 8px;
      padding: 7px 14px; cursor: pointer; border-bottom: 1px solid var(--border);
      transition: background 0.15s; font-size: 0.78rem;
    }
    .flight-item:hover { background: var(--surface2); }
    .flight-item.selected { background: var(--accent-bg); border-left: 3px solid var(--accent); }
    .flight-icon { font-size: 0.9rem; flex-shrink: 0; }
    .flight-info { flex: 1; min-width: 0; }
    .flight-callsign { font-weight: 600; color: var(--text); }
    .flight-meta { font-size: 0.65rem; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .flight-alt { font-size: 0.65rem; color: var(--blue); font-family: var(--font-mono); font-weight: 600; white-space: nowrap; }

    /* ─── Detail Panel ─── */
    .detail-panel { padding: 12px 14px; border-bottom: 1px solid var(--border); }
    .detail-title { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-muted); font-weight: 600; margin-bottom: 8px; }
    .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
    .detail-item label { display: block; font-size: 0.6rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
    .detail-item .val { font-size: 0.85rem; font-weight: 600; color: var(--text); font-family: var(--font-mono); }

    /* ─── Stats ─── */
    .stats-panel { padding: 12px 14px; border-bottom: 1px solid var(--border); }
    .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; text-align: center; }
    .stat-item .val { font-size: 1.1rem; font-weight: 700; color: var(--accent); font-family: var(--font-mono); }
    .stat-item label { font-size: 0.6rem; color: var(--text-muted); text-transform: uppercase; }

    /* ─── Timeline ─── */
    .timeline {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 16px;
      background: var(--surface); border-top: 1px solid var(--border); flex-shrink: 0;
    }
    .timeline .btn { min-width: 36px; text-align: center; }
    .timeline-track { flex: 1; position: relative; height: 6px; background: var(--surface2); border-radius: 3px; cursor: pointer; }
    .timeline-fill { position: absolute; left: 0; top: 0; height: 100%; background: var(--accent); border-radius: 3px; pointer-events: none; }
    .timeline-thumb {
      position: absolute; top: 50%; width: 14px; height: 14px;
      background: var(--accent); border: 2px solid var(--bg); border-radius: 50%;
      transform: translate(-50%, -50%); pointer-events: none;
      box-shadow: 0 0 6px rgba(255,109,58,0.4);
    }
    .timeline-time { font-size: 0.75rem; font-family: var(--font-mono); color: var(--text-muted); min-width: 130px; text-align: right; }
    .speed-group { display: flex; gap: 2px; }
    .speed-group .btn.active { background: var(--accent); color: var(--bg); border-color: var(--accent); }

    #log { height: 100px; }
  </style>
</head>
<body>

  <!-- Topbar -->
  <div class="topbar">
    <a href="index.html">&larr; Examples</a>
    <h1>MapGPU</h1>
    <span class="subtitle">Flight Tracker</span>
    <div class="sep"></div>
    <div class="btn-group">
      <button class="btn active" id="btn-2d">2D</button>
      <button class="btn" id="btn-3d">3D Globe</button>
    </div>
    <div class="sep"></div>
    <span id="sim-status" class="status"><span class="dot"></span><span id="status-text">Loading data...</span></span>
    <span class="spacer"></span>
    <span class="status"><span class="dot"></span>Ready</span>
  </div>

  <div class="main">
    <div id="map-container">
      <!-- Loading Overlay -->
      <div class="loading-overlay" id="loading-overlay">
        <div class="loading-title">&#x2708; Loading Flight Data</div>
        <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
        <div class="loading-sub" id="loading-text">Fetching snapshots... 0 / 119</div>
      </div>
    </div>

    <!-- Sidebar -->
    <div class="sidebar">
      <!-- Stats -->
      <div class="stats-panel">
        <div class="detail-title">Statistics</div>
        <div class="stats-grid">
          <div class="stat-item"><div class="val" id="stat-visible">0</div><label>Visible</label></div>
          <div class="stat-item"><div class="val" id="stat-total">0</div><label>Total</label></div>
          <div class="stat-item"><div class="val" id="stat-speed">1x</div><label>Speed</label></div>
        </div>
      </div>

      <!-- Selected Flight Detail -->
      <div class="detail-panel" id="detail-panel" style="display:none;">
        <div class="detail-title">Selected Flight</div>
        <div style="font-size:1rem;font-weight:700;margin-bottom:8px;color:var(--accent);" id="detail-callsign">--</div>
        <div class="detail-grid">
          <div class="detail-item"><label>Country</label><div class="val" id="detail-country">--</div></div>
          <div class="detail-item"><label>ICAO24</label><div class="val" id="detail-icao">--</div></div>
          <div class="detail-item"><label>Altitude</label><div class="val" id="detail-alt">--</div></div>
          <div class="detail-item"><label>Speed</label><div class="val" id="detail-speed">--</div></div>
          <div class="detail-item"><label>Heading</label><div class="val" id="detail-heading">--</div></div>
          <div class="detail-item"><label>Position</label><div class="val" id="detail-pos">--</div></div>
        </div>
      </div>

      <!-- Flight List -->
      <div class="detail-panel" style="padding-bottom:0;">
        <div class="detail-title">Flights in View (<span id="flight-count">0</span>)</div>
      </div>
      <div class="sidebar-scroll" id="flight-list"></div>
    </div>
  </div>

  <!-- Tooltip (follows cursor) -->
  <div id="tooltip">
    <div class="tip-callsign" id="tip-callsign"></div>
    <div class="tip-country" id="tip-country"></div>
    <div class="tip-grid">
      <label>Alt</label><span id="tip-alt"></span>
      <label>Speed</label><span id="tip-speed"></span>
      <label>Heading</label><span id="tip-heading"></span>
      <label>V/S</label><span id="tip-vrate"></span>
    </div>
  </div>

  <!-- Timeline -->
  <div class="timeline">
    <button class="btn btn-sm" id="btn-play">&#9654;</button>
    <button class="btn btn-sm" id="btn-reset">&#8634;</button>
    <div class="sep"></div>
    <div class="speed-group">
      <button class="btn btn-sm active" data-speed="1">1x</button>
      <button class="btn btn-sm" data-speed="5">5x</button>
      <button class="btn btn-sm" data-speed="10">10x</button>
      <button class="btn btn-sm" data-speed="30">30x</button>
    </div>
    <div class="sep"></div>
    <div class="timeline-track" id="timeline-track">
      <div class="timeline-fill" id="timeline-fill"></div>
      <div class="timeline-thumb" id="timeline-thumb"></div>
    </div>
    <div class="timeline-time" id="timeline-time">00:00 / 00:00 UTC</div>
  </div>

  <div id="log"></div>

  <script type="module" src="./src/flight-tracker.ts"></script>
</body>
</html>
