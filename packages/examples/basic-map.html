<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MapGPU — Basic Map</title>
  <link rel="stylesheet" href="./src/theme.css" />
</head>
<body>
  <div class="topbar">
    <a href="/examples/">&larr; Examples</a>
    <h1>MapGPU</h1>
    <span class="subtitle">Basic Map</span>
    <div class="sep"></div>
    <button class="btn" id="btn-zoom-in">Zoom In (+)</button>
    <button class="btn" id="btn-zoom-out">Zoom Out (&minus;)</button>
    <div class="sep"></div>
    <button class="btn" id="btn-istanbul">Istanbul</button>
    <button class="btn" id="btn-ankara">Ankara</button>
    <span class="spacer"></span>
    <span class="status"><span class="status-dot"></span>Ready</span>
  </div>
  <div id="map-container">
    <div class="info-bar">
      Center: <span id="info-center">--</span>
      Zoom: <span id="info-zoom">--</span>
    </div>
  </div>
  <div id="log"></div>
  <script type="module" src="./src/basic-map.ts"></script>
</body>
</html>
