<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MapGPU — MIL-STD-2525C Symbols</title>
  <link rel="stylesheet" href="./src/theme.css" />
  <style>
    .topbar { flex-wrap: wrap; }

    /* ─── Side Panel ─── */
    .panel { width: 320px; background: var(--surface); border-left: 1px solid var(--border); overflow-y: auto; padding: 12px; font-size: 0.8rem; }
    .panel h3 { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); margin-bottom: 8px; }
    .panel .section { margin-bottom: 16px; }

    .symbol-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 6px; }
    .symbol-card { display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 6px; background: var(--surface2); border-radius: 6px; border: 1px solid var(--border); cursor: pointer; transition: all 0.15s; }
    .symbol-card:hover { border-color: var(--accent); background: var(--accent-bg); }
    .symbol-card.active { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }
    .symbol-card img { width: 48px; height: 48px; }
    .symbol-card span { font-size: 0.6rem; color: var(--text-muted); text-align: center; line-height: 1.2; }

    .aff-btn-group { display: flex; gap: 4px; flex-wrap: wrap; }
    .aff-btn-group button { padding: 4px 10px; border: 1px solid var(--border); border-radius: 4px; cursor: pointer; font-size: 0.75rem; color: var(--text); transition: all 0.15s; }
    .aff-btn-group button.active { font-weight: bold; }
    .aff-btn-group .aff-friend { background: #80E0FF40; }
    .aff-btn-group .aff-friend.active { background: #80E0FF; border-color: #0088CC; }
    .aff-btn-group .aff-hostile { background: #FF808040; }
    .aff-btn-group .aff-hostile.active { background: #FF8080; border-color: #CC0000; }
    .aff-btn-group .aff-neutral { background: #AAFFAA40; }
    .aff-btn-group .aff-neutral.active { background: #AAFFAA; border-color: #008800; }
    .aff-btn-group .aff-unknown { background: #FFFF8040; }
    .aff-btn-group .aff-unknown.active { background: #FFFF80; border-color: #888800; }
    .aff-btn-group .aff-suspect { background: #FFE58040; }
    .aff-btn-group .aff-suspect.active { background: #FFE580; border-color: #CC8800; }
    .aff-btn-group .aff-joker { background: #80E0FF40; border-style: dashed; }
    .aff-btn-group .aff-joker.active { background: #FF8080; border-color: #CC0000; }

    .ech-select, .status-select { width: 100%; padding: 6px; background: var(--surface2); border: 1px solid var(--border); border-radius: 4px; color: var(--text); font-size: 0.78rem; }

    .info-box { padding: 8px; background: var(--surface2); border-radius: 4px; border: 1px solid var(--border); font-size: 0.72rem; color: var(--text-muted); line-height: 1.5; font-family: monospace; white-space: pre-wrap; word-break: break-all; }

    .svg-preview { display: flex; justify-content: center; align-items: center; padding: 12px; background: #fff; border-radius: 6px; border: 1px solid var(--border); min-height: 100px; }

    .compare-row { display: flex; gap: 8px; }
    .compare-col { flex: 1; display: flex; flex-direction: column; gap: 4px; }
    .compare-label { font-size: 0.65rem; color: var(--text-muted); text-align: center; text-transform: uppercase; letter-spacing: 0.5px; }

    #log { height: 80px; }
  </style>
</head>
<body>

  <!-- Toolbar -->
  <div class="topbar">
    <a href="/examples/">&larr; Examples</a>
    <h1>MapGPU</h1>
    <span class="subtitle">MIL-STD-2525C/D Symbols</span>
    <div class="sep"></div>
    <div class="btn-group">
      <button class="btn active" id="btn-2d">2D</button>
      <button class="btn" id="btn-3d">3D Globe</button>
    </div>
    <div class="sep"></div>
    <button class="btn" id="btn-place">Place on Map</button>
    <div class="sep"></div>
    <span class="ctrl">Size: <input id="slider-size" type="range" min="24" max="96" step="4" value="48" /> <span class="val" id="val-size">48</span>px</span>
    <div class="sep"></div>
    <button class="btn btn-sm" id="btn-europe">Europe</button>
    <button class="btn btn-sm" id="btn-world">World</button>
    <span class="spacer"></span>
    <span class="status"><span class="status-dot"></span>Ready</span>
  </div>

  <div class="main">
    <div id="map-container"></div>

    <!-- Side Panel -->
    <div class="panel">
      <div class="section">
        <h3>Affiliation</h3>
        <div class="aff-btn-group">
          <button id="aff-F" class="aff-friend active">Friend</button>
          <button id="aff-H" class="aff-hostile">Hostile</button>
          <button id="aff-N" class="aff-neutral">Neutral</button>
          <button id="aff-U" class="aff-unknown">Unknown</button>
          <button id="aff-S" class="aff-suspect">Suspect</button>
          <button id="aff-J" class="aff-joker">Joker</button>
        </div>
      </div>

      <div class="section">
        <h3>Echelon</h3>
        <select id="echelon" class="ech-select">
          <option value="-">— None</option>
          <option value="A">Team/Crew (Ø)</option>
          <option value="B">Squad (•)</option>
          <option value="C">Section (••)</option>
          <option value="D">Platoon (|)</option>
          <option value="E">Company (I)</option>
          <option value="F" selected>Battalion (II)</option>
          <option value="G">Regiment (III)</option>
          <option value="H">Brigade (X)</option>
          <option value="I">Division (XX)</option>
          <option value="J">Corps (XXX)</option>
          <option value="K">Army (XXXX)</option>
        </select>
      </div>

      <div class="section">
        <h3>Status</h3>
        <select id="status" class="status-select">
          <option value="P" selected>Present</option>
          <option value="A">Anticipated/Planned</option>
          <option value="C">Fully Capable</option>
          <option value="D">Damaged</option>
          <option value="X">Destroyed</option>
          <option value="F">Full to Capacity</option>
        </select>
      </div>

      <div class="section">
        <h3>Free SIDC Input</h3>
        <div style="display:flex; gap:4px;">
          <input id="sidc-input" type="text" maxlength="20" spellcheck="false" placeholder="SFGPUCI---F---G or 10031000001211000000" style="flex:1; padding:6px 8px; font-family:monospace; font-size:0.85rem; letter-spacing:1px; background:var(--surface2); border:1px solid var(--border); border-radius:4px; color:var(--text); text-transform:uppercase;" />
          <button id="sidc-go" class="btn btn-sm" style="white-space:nowrap;">Apply</button>
        </div>
        <div id="sidc-error" style="font-size:0.7rem; color:#e74c3c; margin-top:4px; min-height:1em;"></div>
      </div>

      <div class="section">
        <h3>Karşılaştırma</h3>
        <div class="compare-row">
          <div class="compare-col">
            <span class="compare-label">@mapgpu/symbols</span>
            <div id="svg-preview" class="svg-preview"></div>
          </div>
          <div class="compare-col">
            <span class="compare-label">@mapgpu/milsymbol</span>
            <div id="ms-preview" class="svg-preview"></div>
          </div>
        </div>
      </div>

      <div class="section">
        <h3>SIDC Info</h3>
        <div id="sidc-info" class="info-box">Select a symbol...</div>
      </div>

      <div class="section">
        <h3>Symbol Library</h3>
        <div id="symbol-grid" class="symbol-grid"></div>
      </div>
    </div>
  </div>

  <div id="log"></div>

  <script type="module" src="./src/milstd-symbols.ts"></script>
</body>
</html>
