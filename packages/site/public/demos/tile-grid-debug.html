<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MapGPU — Tile Grid Debug</title>
  <script type="module" crossorigin src="/assets/tile-grid-debug-TqLRQoWS.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/index-vHIG8pf8.js">
  <link rel="stylesheet" crossorigin href="/assets/theme-BNuG_S54.css">
</head>
<body>
  <div class="topbar">
    <a href="index.html">&larr; Examples</a>
    <h1>MapGPU</h1>
    <span class="subtitle">Tile Grid Debug</span>
    <div class="sep"></div>
    <button class="btn active" id="btn-grid">Grid: ON</button>
    <div class="sep"></div>
    <button class="btn" id="btn-brush">Brush: OFF</button>
    <button class="btn" id="btn-clear">Clear Heights</button>
    <label class="ctrl" for="brush-softness">
      Softness
      <input type="range" id="brush-softness" min="0" max="1" step="0.05" value="0.80" />
      <span class="val" id="info-softness">0.80</span>
    </label>
    <div class="sep"></div>
    <div class="btn-group">
      <button class="btn active" id="btn-2d">2D</button>
      <button class="btn" id="btn-3d">3D Globe</button>
    </div>
    <span class="spacer"></span>
    <span class="status"><span class="status-dot"></span><span id="status-text">Initializing...</span></span>
  </div>
    <div id="map-container">
      <div class="info-bar">
        Grid: <span id="info-grid">32x32</span>
        Vertices/tile: <span id="info-verts">1,089</span>
        Zoom: <span id="info-zoom">--</span>
        Brush radius: <span id="info-radius">--</span>
      </div>
    </div>
  <div id="log"></div>
</body>
</html>
