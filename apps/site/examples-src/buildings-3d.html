<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MapGPU — 3D Buildings</title>
  <link rel="stylesheet" href="./src/theme.css" />
</head>
<body>
  <div class="topbar">
    <button class="btn" id="btn-mode">Switch to 3D</button>
    <div class="sep"></div>
    <button class="btn" id="btn-istanbul">Istanbul</button>
    <button class="btn" id="btn-nyc">New York</button>
    <button class="btn" id="btn-london">London</button>
    <button class="btn" id="btn-paris">Paris</button>
    <span class="spacer"></span>
    <label style="color:var(--text-muted);font-size:.78rem;">
      Ambient <input type="range" id="ambient" min="0" max="100" value="35" style="width:80px;vertical-align:middle;" />
      <span id="ambient-val">0.35</span>
    </label>
    <div class="sep"></div>
    <label style="color:var(--text-muted);font-size:.78rem;">
      Shininess <input type="range" id="shininess" min="1" max="128" value="32" style="width:70px;vertical-align:middle;" />
      <span id="shininess-val">32</span>
    </label>
    <label style="color:var(--text-muted);font-size:.78rem;margin-left:8px;">
      Specular <input type="range" id="specular" min="0" max="100" value="15" style="width:70px;vertical-align:middle;" />
      <span id="specular-val">0.15</span>
    </label>
    <div class="sep"></div>
    <button class="btn" id="btn-debug" style="font-size:.72rem;">Debug</button>
    <span class="status"><span class="status-dot"></span>Ready</span>
  </div>
  <div id="map-container"></div>
  <script type="module" src="./src/buildings-3d.ts"></script>
</body>
</html>
