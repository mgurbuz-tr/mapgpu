<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>MapGPU — 3D Tile Style</title><link rel="stylesheet" href="./src/theme.css" /><style>#style-panel { position: absolute; top: 12px; right: 12px; background: rgba(22,27,34,0.95); border: 1px solid var(--border); border-radius: 8px; padding: 14px; z-index: 100; font-size: 0.78rem; color: var(--text-muted); min-width: 240px; } #style-panel h3 { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 8px; } .result-row { display: flex; gap: 8px; padding: 4px 0; align-items: center; } .color-swatch { width: 16px; height: 16px; border-radius: 3px; border: 1px solid var(--border); }</style></head>
<body>
  <div class="topbar"><button class="btn primary" id="btn-eval">Evaluate Style</button><button class="btn" id="btn-3d">Switch to 3D</button><span class="spacer"></span><span class="status"><span class="status-dot"></span>Ready</span></div>
  <div id="map-container">
    <div id="style-panel">
      <h3>Tile Style Evaluation</h3>
      <div id="results">Click "Evaluate" to test style conditions against sample features.</div>
    </div>
  </div>
  <script type="module" src="./src/tile-style.ts"></script>
</body>
</html>
