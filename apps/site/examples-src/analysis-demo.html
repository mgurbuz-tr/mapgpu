<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MapGPU — Analysis Demo</title>
  <link rel="stylesheet" href="./src/theme.css" />
  <style>
    #results { width: 340px; flex-shrink: 0; background: var(--surface); border-left: 1px solid var(--border); padding: 14px 16px; overflow-y: auto; }
    #results h2 { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-muted); margin-bottom: 10px; font-weight: 600; }
    #results p { font-size: 0.78rem; color: var(--text-muted); line-height: 1.5; }
    #results pre { background: var(--bg); color: var(--green); padding: 10px; border-radius: 6px; font-size: 0.72rem; font-family: var(--font-mono); margin-bottom: 14px; white-space: pre-wrap; word-break: break-all; max-height: 200px; overflow-y: auto; border: 1px solid var(--border); }
  </style>
</head>
<body>
  <div class="topbar">
    <button class="btn" id="btn-buffer">Buffer (50km)</button>
    <button class="btn" id="btn-route">Route Sampling</button>
    <button class="btn" id="btn-elevation">Elevation Query</button>
    <button class="btn primary" id="btn-all">Run All</button>
    <div class="sep"></div>
    <button class="btn" id="btn-3d">Switch to 3D</button>
    <span class="spacer"></span>
    <span class="status"><span class="status-dot"></span>Ready</span>
  </div>
  <div class="main">
    <div id="map-container"></div>
    <div id="results">
      <h2>Analysis Results</h2>
      <p>Click a button above to run an analysis. Results will appear here.</p>
      <div id="result-buffer"></div>
      <div id="result-route"></div>
      <div id="result-elevation"></div>
    </div>
  </div>
  <script type="module" src="./src/analysis-demo.ts"></script>
</body>
</html>
