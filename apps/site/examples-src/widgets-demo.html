<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MapGPU — Widgets Showcase</title>
  <link rel="stylesheet" href="./src/theme.css" />
  <style>
    #search-panel { position: absolute; top: 12px; left: 50%; transform: translateX(-50%); z-index: 1001; }
    #search-panel input { width: 340px; padding: 9px 16px; border: 1px solid var(--border); border-radius: 6px; background: rgba(22,27,34,0.95); color: var(--text); font-size: 0.85rem; font-family: inherit; outline: none; box-shadow: 0 2px 12px rgba(0,0,0,0.3); }
    #search-panel input:focus { border-color: var(--accent); box-shadow: 0 2px 16px rgba(255,109,58,0.15); }
    #search-panel input::placeholder { color: var(--text-muted); }
  </style>
</head>
<body>
  <div class="topbar">
    <button class="btn" id="btn-toggle-layers">Toggle LayerList</button>
    <button class="btn" id="btn-toggle-basemap">Toggle BasemapGallery</button>
    <button class="btn" id="btn-coord-format">Cycle Coord Format</button>
    <div class="sep"></div>
    <button class="btn" id="btn-3d">Switch to 3D</button>
    <span class="spacer"></span>
    <span class="status"><span class="status-dot"></span>Ready</span>
  </div>
  <div id="map-container">
    <div id="search-panel">
      <input type="text" id="search-input" placeholder="Search location (mock)..." />
    </div>
  </div>
  <script type="module" src="./src/widgets-demo.ts"></script>
</body>
</html>
