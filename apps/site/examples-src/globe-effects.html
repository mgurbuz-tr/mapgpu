<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>MapGPU — Globe Effects</title><link rel="stylesheet" href="./src/theme.css" /><style>#fx-panel { position: absolute; top: 12px; right: 12px; background: rgba(22,27,34,0.95); border: 1px solid var(--border); border-radius: 8px; padding: 14px; z-index: 100; min-width: 200px; font-size: 0.78rem; } #fx-panel h3 { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-muted); margin-bottom: 8px; } .fx-row { display: flex; align-items: center; gap: 8px; padding: 3px 0; color: var(--text); }</style></head>
<body>
  <div class="topbar"><button class="btn primary" id="btn-resolve">Resolve Config</button><button class="btn" id="btn-3d">Switch to 3D</button><span class="spacer"></span><span class="status"><span class="status-dot"></span>Ready</span></div>
  <div id="map-container">
    <div id="fx-panel">
      <h3>Globe Effects</h3>
      <div class="fx-row"><input type="checkbox" id="cb-fog" /><label for="cb-fog">Fog</label></div>
      <div class="fx-row"><input type="checkbox" id="cb-night" /><label for="cb-night">Night Imagery</label></div>
      <div class="fx-row"><input type="checkbox" id="cb-water" /><label for="cb-water">Water Mask</label></div>
      <div class="fx-row"><input type="checkbox" id="cb-atmo" checked /><label for="cb-atmo">Atmosphere</label></div>
    </div>
  </div>
  <script type="module" src="./src/globe-effects.ts"></script>
</body>
</html>
