<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MapGPU — WMS Layer</title>
  <link rel="stylesheet" href="./src/theme.css" />
  <style>
    .sidebar { width: 280px; }
    #sidebar h2 { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-muted); margin-bottom: 10px; font-weight: 600; }
    #sidebar p { font-size: 0.78rem; color: var(--text-muted); line-height: 1.5; }
    #layer-list-container { margin-bottom: 16px; }
  </style>
</head>
<body>
  <div class="topbar">    <span class="subtitle">WMS Layer</span>
    <button class="btn" id="btn-3d">Switch to 3D</button>
    <span class="spacer"></span>
    <span class="status"><span class="status-dot"></span>Ready</span>
  </div>
  <div class="main">
    <div id="map-container"></div>
    <div id="sidebar" class="sidebar" style="padding: 16px;">
      <h2>Layer Control</h2>
      <div id="layer-list-container"></div>
      <h2>Feature Query</h2>
      <p>Click on the map to query features. Results will appear in the log below.</p>
    </div>
  </div>
  <script type="module" src="./src/wms-layer.ts"></script>
</body>
</html>
