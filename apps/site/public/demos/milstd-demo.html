<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MapGPU — MIL-STD-2525D/E Symbology</title>
  <style>
    .topbar { flex-wrap: wrap; }

    /* ─── Side Panel ─── */
    .panel { width: 380px; background: var(--surface); border-left: 1px solid var(--border); overflow-y: auto; padding: 12px; font-size: 0.8rem; }
    .panel h3 { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); margin-bottom: 6px; margin-top: 10px; }
    .panel h3:first-child { margin-top: 0; }
    .panel .section { margin-bottom: 10px; }

    .sel { width: 100%; padding: 5px 6px; background: var(--surface2); border: 1px solid var(--border); border-radius: 4px; color: var(--text); font-size: 0.76rem; }
    .sel:disabled { opacity: 0.4; cursor: not-allowed; }
    .sel option:disabled { color: var(--text-muted); opacity: 0.4; }

    /* Identity grid: label + select on each row, fixed widths */
    .identity-grid { display: grid; grid-template-columns: 72px 1fr; gap: 5px 8px; align-items: center; }
    .identity-grid label { font-size: 0.72rem; color: var(--text-muted); }

    .listbox { width: 100%; font-size: 0.72rem; font-family: monospace; background: var(--surface2); border: 1px solid var(--border); border-radius: 4px; color: var(--text); }
    .listbox option { padding: 2px 4px; }
    .listbox option:checked { background: var(--accent); color: #fff; }
    .listbox optgroup { font-style: normal; font-weight: 600; color: var(--text-muted); padding: 4px 0 2px; }

    .row { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
    .row label { font-size: 0.72rem; color: var(--text-muted); min-width: 60px; }
    .row input[type="text"] { padding: 5px 6px; background: var(--surface2); border: 1px solid var(--border); border-radius: 4px; color: var(--text); font-size: 0.76rem; }

    /* Tab bar */
    .tab-bar { display: flex; gap: 4px; margin-bottom: 6px; }
    .tab-btn { flex: 1; padding: 5px 8px; font-size: 0.72rem; background: var(--surface2); border: 1px solid var(--border); border-radius: 4px; color: var(--text-muted); cursor: pointer; text-align: center; }
    .tab-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    /* Catalog filter */
    .catalog-filter { width: 100%; padding: 5px 8px; background: var(--surface2); border: 1px solid var(--border); border-radius: 4px; color: var(--text); font-size: 0.74rem; margin-bottom: 6px; box-sizing: border-box; }
    .catalog-filter::placeholder { color: var(--text-muted); }

    /* SVG Preview */
    .svg-preview { display: flex; justify-content: center; align-items: center; padding: 8px; background: #fff; border-radius: 6px; border: 1px solid var(--border); min-height: 120px; }
    .svg-preview svg { max-width: 280px; max-height: 200px; }

    /* Draw status */
    .draw-status { font-size: 0.72rem; padding: 8px; border-radius: 4px; background: var(--surface2); border: 1px solid var(--border); color: var(--text-muted); min-height: 3em; }
    .draw-status.active { background: rgba(255, 109, 58, 0.1); border-color: var(--accent); color: var(--accent); }

    /* Info & SIDC */
    .info-box { padding: 6px 8px; background: var(--surface2); border-radius: 4px; border: 1px solid var(--border); font-size: 0.68rem; color: var(--text-muted); line-height: 1.4; font-family: monospace; white-space: pre-wrap; word-break: break-all; }
    .sidc-input-row { display: flex; gap: 4px; }
    .sidc-input-row input { flex: 1; padding: 6px 8px; font-family: monospace; font-size: 0.82rem; letter-spacing: 1px; background: var(--surface2); border: 1px solid var(--border); border-radius: 4px; color: var(--text); }
    .sidc-error { font-size: 0.7rem; color: #e74c3c; margin-top: 4px; min-height: 1em; }

    .count-badge { font-size: 0.65rem; color: var(--accent); font-weight: 600; }
    .nav-row { display: flex; gap: 6px; flex-wrap: wrap; }
  </style>
  <script type="module" crossorigin src="./assets/milstd-demo-vSOS4NTo.js"></script>
  <link rel="modulepreload" crossorigin href="./assets/index-CCIhYy9t.js">
  <link rel="modulepreload" crossorigin href="./assets/CallbackRenderer-Wkt_9Cyp.js">
  <link rel="modulepreload" crossorigin href="./assets/GeoJSONLayer-BLKK20UV.js">
  <link rel="stylesheet" crossorigin href="./assets/index-DxKdm2In.css">
</head>
<body>

  <!-- Topbar -->
  <div class="topbar">
    <div class="btn-group">
      <button class="btn active" id="btn-2d">2D</button>
      <button class="btn" id="btn-3d">3D</button>
    </div>
    <div class="sep"></div>
    <button class="btn" id="btn-place" style="display:none;">Place on Map</button>
    <button class="btn" id="btn-draw" style="display:none;">Draw</button>
    <button class="btn" id="btn-cancel" style="display:none;" disabled>Cancel</button>
    <button class="btn" id="btn-undo" style="display:none;" disabled>Undo</button>
    <div class="sep"></div>
    <button class="btn btn-sm" id="btn-clear">Clear All</button>
    <span class="spacer"></span>
    <span class="status"><span class="status-dot"></span>Ready</span>
  </div>

  <div class="main">
    <div id="map-container"></div>

    <!-- Sidebar -->
    <div class="panel">

      <!-- 1. Standard & Identity -->
      <h3>Standard &amp; Identity</h3>
      <div class="section identity-grid">
        <label>Version</label>
        <select id="lbVersion" class="sel">
          <option value="10">2525D</option>
          <option value="11" selected>2525Dch1</option>
          <option value="13">2525E</option>
        </select>
        <label>Context</label>
        <select id="lbContext" class="sel">
          <option value="0" selected>Reality</option>
          <option value="1">Exercise</option>
          <option value="2">Simulation</option>
        </select>
        <label>Affiliation</label>
        <select id="lbAffiliation" class="sel">
          <option value="0">Pending</option>
          <option value="1">Unknown</option>
          <option value="2">Assumed Friend</option>
          <option value="3" selected>Friend</option>
          <option value="4">Neutral</option>
          <option value="5">Suspect/Joker</option>
          <option value="6">Hostile/Faker</option>
        </select>
        <label id="lbl-status">Status</label>
        <select id="lbStatus" class="sel">
          <option value="0" selected>Present</option>
          <option value="1">Planned</option>
          <option value="2">Fully Capable</option>
          <option value="3">Damaged</option>
          <option value="4">Destroyed</option>
          <option value="5">Full to Capacity</option>
        </select>
        <label id="lbl-hqtfd">HQ/TF/D</label>
        <select id="lbHQTFD" class="sel">
          <option value="0" selected>None</option>
          <option value="1">Feint/Dummy</option>
          <option value="2">Headquarters</option>
          <option value="3">F/D + HQ</option>
          <option value="4">Task Force</option>
          <option value="5">F/D + TF</option>
          <option value="6">TF + HQ</option>
          <option value="7">F/D + TF + HQ</option>
        </select>
        <label id="lbl-echelon">Echelon</label>
        <select id="lbAmp" class="sel">
          <option value="00" selected>None</option>
          <option value="11">Team/Crew</option>
          <option value="12">Squad</option>
          <option value="13">Section</option>
          <option value="14">Platoon</option>
          <option value="15">Company</option>
          <option value="16">Battalion</option>
          <option value="17">Regiment</option>
          <option value="18">Brigade</option>
          <option value="21">Division</option>
          <option value="22">Corps</option>
          <option value="23">Army</option>
          <option value="24">Army Group</option>
          <option value="25">Region</option>
          <option value="26">Command</option>
        </select>
      </div>

      <!-- 2. Symbol Catalog -->
      <h3>Symbol Catalog</h3>
      <div class="section">
        <div class="tab-bar">
          <button class="tab-btn active" id="tab-points">Points <span id="badge-points" class="count-badge"></span></button>
          <button class="tab-btn" id="tab-lines">Lines <span id="badge-lines" class="count-badge"></span></button>
          <button class="tab-btn" id="tab-polygons">Polygons <span id="badge-polygons" class="count-badge"></span></button>
        </div>
        <input type="text" class="catalog-filter" id="catalog-filter" placeholder="Filter symbols..." />
        <select id="sel-points" class="listbox" size="12"></select>
        <select id="sel-lines" class="listbox" size="12" style="display:none;"></select>
        <select id="sel-polygons" class="listbox" size="12" style="display:none;"></select>
      </div>

      <!-- 3. Preview -->
      <div id="panel-svg-preview" class="section">
        <h3>SVG Preview</h3>
        <div id="svg-preview" class="svg-preview">
          <span style="color:#999;font-size:0.7rem">Select a symbol...</span>
        </div>
      </div>
      <div id="panel-draw-status" class="section" style="display:none;">
        <h3>Drawing Status</h3>
        <div id="draw-status" class="draw-status">Select a symbol, then click Draw</div>
      </div>

      <!-- 4. Settings -->
      <div id="point-settings" class="section">
        <h3>Settings</h3>
        <div class="row" style="margin-bottom:6px;">
          <label>Size</label>
          <input id="slider-size" type="range" min="24" max="200" step="4" value="80" style="flex:1;" />
          <span id="val-size" style="min-width:30px;font-size:0.72rem;">80px</span>
        </div>
        <div class="row">
          <label style="display:flex;align-items:center;gap:4px;min-width:0;font-size:0.72rem;color:var(--text-muted);">
            <input type="checkbox" id="cb-labels" checked /> Labels
          </label>
          <label style="display:flex;align-items:center;gap:4px;min-width:0;font-size:0.72rem;color:var(--text-muted);">
            <input type="checkbox" id="cb-icon" /> Icon Mode
          </label>
        </div>
      </div>
      <div id="tactical-settings" class="section" style="display:none;">
        <h3>Tactical Settings</h3>
        <div class="row" style="margin-bottom:6px;">
          <label>Label (T)</label>
          <input type="text" id="txtDesignation" value="ALPHA" style="flex:1;" />
        </div>
        <div id="am-row" class="row" style="display:none;margin-bottom:6px;">
          <label>AM (dist, m)</label>
          <input type="text" id="txtAM" value="5000" style="width:120px;" placeholder="e.g. 5000" />
        </div>
        <div id="an-row" class="row" style="display:none;margin-bottom:6px;">
          <label>AN (azimuth)</label>
          <input type="text" id="txtAN" value="0" style="width:120px;" placeholder="e.g. 0" />
        </div>
      </div>

      <!-- 5. Free SIDC Input -->
      <h3>Free SIDC Input</h3>
      <div class="section">
        <div class="sidc-input-row">
          <input id="sidc-input" type="text" maxlength="30" spellcheck="false" placeholder="20-30 digit numeric SIDC" />
          <button id="sidc-go" class="btn btn-sm" style="white-space:nowrap;">Apply</button>
        </div>
        <div id="sidc-error" class="sidc-error"></div>
      </div>

      <!-- 6. Symbol Info -->
      <h3>Symbol ID Code</h3>
      <div class="section">
        <input id="tbSymbolID" type="text" readonly class="sel" style="font-family:monospace;font-size:0.8rem;letter-spacing:1px;" />
      </div>
      <h3>Symbol Info</h3>
      <div class="section">
        <div id="sym-info" class="info-box">Select a symbol...</div>
      </div>

      <!-- 7. Navigation -->
      <h3>Navigation</h3>
      <div class="nav-row">
        <button class="btn btn-sm" id="btn-istanbul">Istanbul</button>
        <button class="btn btn-sm" id="btn-europe">Europe</button>
        <button class="btn btn-sm" id="btn-mideast">Middle East</button>
      </div>

    </div>
  </div>


<script>if(window!==window.top||new URLSearchParams(location.search).has("embed")){document.body.classList.add("embed-mode")}</script>
</body>
</html>
