<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MapGPU — Snap Demo</title>
  <style>
    #info-panel { position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%); background: rgba(22,27,34,0.92); color: var(--text-muted); padding: 6px 16px; border-radius: 6px; font-size: 0.75rem; font-family: var(--font-mono); pointer-events: none; z-index: 100; border: 1px solid var(--border); backdrop-filter: blur(4px); white-space: nowrap; }
    .badge { font-size: 0.73rem; color: var(--text-muted); display: flex; align-items: center; gap: 6px; background: var(--surface2); padding: 4px 10px; border-radius: 5px; border: 1px solid var(--border); }
    .badge span { color: var(--accent); font-weight: 600; }

    /* Snap control panel */
    #snap-panel { position: absolute; top: 12px; right: 12px; background: rgba(22,27,34,0.95); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; z-index: 100; backdrop-filter: blur(8px); min-width: 180px; }
    #snap-panel h3 { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-muted); margin-bottom: 8px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
    .snap-row { display: flex; align-items: center; gap: 8px; padding: 3px 0; }
    .snap-row label { font-size: 0.78rem; color: var(--text); cursor: pointer; flex: 1; }
    .snap-row input[type="checkbox"] { accent-color: var(--accent); cursor: pointer; }
    .snap-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    #snap-type-indicator { position: absolute; top: 12px; left: 50%; transform: translateX(-50%); background: rgba(0,230,64,0.15); color: #00e640; padding: 4px 14px; border-radius: 5px; font-size: 0.75rem; font-family: var(--font-mono); font-weight: 600; z-index: 100; border: 1px solid rgba(0,230,64,0.3); opacity: 0; transition: opacity 0.15s; pointer-events: none; }
    #snap-type-indicator.visible { opacity: 1; }
  </style>
  <script type="module" crossorigin src="./assets/snap-demo-DemBPSQx.js"></script>
  <link rel="modulepreload" crossorigin href="./assets/index-CCIhYy9t.js">
  <link rel="modulepreload" crossorigin href="./assets/GraphicsLayer-CXN-pnBA.js">
  <link rel="modulepreload" crossorigin href="./assets/SnapVisualizer-CT0WedVn.js">
  <link rel="modulepreload" crossorigin href="./assets/CreateFeatureCommand-DQuikcA7.js">
  <link rel="modulepreload" crossorigin href="./assets/geometryHelpers-DTRhB0qT.js">
  <link rel="modulepreload" crossorigin href="./assets/SnapEngine-BW5rtCBz.js">
  <link rel="modulepreload" crossorigin href="./assets/DrawPolylineTool-BFD-XiTP.js">
  <link rel="stylesheet" crossorigin href="./assets/index-DxKdm2In.css">
</head>
<body>
  <div class="topbar">
    <button class="btn active" id="btn-polyline">Polyline</button>
    <button class="btn" id="btn-polygon">Polygon</button>
    <button class="btn" id="btn-point">Point</button>
    <div class="sep"></div>
    <button class="btn" id="btn-seed">Add Sample Features</button>
    <button class="btn" id="btn-clear">Clear All</button>
    <div class="sep"></div>
    <button class="btn" id="btn-3d">Switch to 3D</button>
    <span class="spacer"></span>
    <span class="badge">Features: <span id="feature-count">0</span></span>
    <span class="status"><span class="status-dot"></span>Ready</span>
  </div>
  <div id="map">
    <div id="snap-type-indicator"></div>
    <div id="info-panel">Select a tool and draw near existing features to see snapping in action.</div>
    <div id="snap-panel">
      <h3>Snap Types</h3>
      <div class="snap-row">
        <input type="checkbox" id="snap-endpoint" checked />
        <span class="snap-dot" style="background:#00e640"></span>
        <label for="snap-endpoint">Endpoint</label>
      </div>
      <div class="snap-row">
        <input type="checkbox" id="snap-midpoint" checked />
        <span class="snap-dot" style="background:#ffb800"></span>
        <label for="snap-midpoint">Midpoint</label>
      </div>
      <div class="snap-row">
        <input type="checkbox" id="snap-nearest" checked />
        <span class="snap-dot" style="background:#00c8ff"></span>
        <label for="snap-nearest">Nearest</label>
      </div>
      <div class="snap-row">
        <input type="checkbox" id="snap-intersection" checked />
        <span class="snap-dot" style="background:#ff6d3a"></span>
        <label for="snap-intersection">Intersection</label>
      </div>
      <div class="snap-row">
        <input type="checkbox" id="snap-angle" />
        <span class="snap-dot" style="background:#b4ff00"></span>
        <label for="snap-angle">Angle Guide</label>
      </div>
    </div>
  </div>
<script>if(window!==window.top||new URLSearchParams(location.search).has("embed")){document.body.classList.add("embed-mode")}</script>
</body>
</html>
